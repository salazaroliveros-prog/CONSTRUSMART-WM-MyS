<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f97316" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="12" y="12" width="176" height="176" rx="32" fill="#0f172a"/>
  <rect x="13" y="13" width="174" height="174" rx="31" fill="none" stroke="#f97316" stroke-width="1.5" filter="url(#glow)"/>
  <text x="100" y="118" font-family="system-ui,sans-serif" font-weight="800" font-size="60" fill="#f8fafc" text-anchor="middle" letter-spacing="-2">WM</text>
</svg>
