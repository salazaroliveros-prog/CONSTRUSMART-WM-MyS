name: Backup Verification

on:
  schedule:
    # Run every Sunday at 2:00 AM
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run backup verification
        run: npm run backup:verify
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-verification-report
          path: backup-verification-report.json

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-verification-log
          path: backup-verification.log

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Backup Verification Failed',
              body: `Backup verification failed at ${new Date().toISOString()}. Check the workflow logs for details.`
            });
