name: Validate & Deploy - CONSTRUSMART ERP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Validate & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      NODE_VERSION: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run

      - name: Deploy to Vercel Production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::Missing Vercel secrets. Skipping deploy."
            exit 0
          fi
          npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes

      - name: Post-Deploy Validation
        if: always()
        run: |
          ENDPOINT="https://construsmart-wm2026.vercel.app/"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$ENDPOINT")
          echo "HTTP Response Code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Deployment failed: HTTP status $RESPONSE"
            exit 1
          fi
          echo "Homepage is accessible"
