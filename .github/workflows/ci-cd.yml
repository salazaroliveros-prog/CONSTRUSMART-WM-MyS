name: CI/CD — CONSTRUSMART ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - env:
          CI: true
        run: npm test -- --run

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: git config --global user.name "Construsmart WM" && git config --global user.email "ops@construsmart.local"
      - run: npm ci --legacy-peer-deps
      - run: npm run build
        env:
          VITE_APP_ENV: production
          NODE_OPTIONS: "--max-old-space-size=8192"
      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::Missing Vercel secrets (VERCEL_ORG_ID, VERCEL_PROJECT_ID, VERCEL_TOKEN). Skipping auto-deploy."
            echo "Build ready for manual deploy."
            exit 0
          fi
          echo "Deploying to Vercel production..."
          if ! npx vercel deploy --prod --token "$VERCEL_TOKEN" --scope proyectoswm --yes 2>&1; then
            echo "::warning::Vercel deploy failed. Check VERCEL_ORG_ID ($VERCEL_ORG_ID) and VERCEL_PROJECT_ID ($VERCEL_PROJECT_ID) secrets."
            echo "Build successful but deploy skipped."
            exit 0
          fi
      - name: Post-Deploy Validation
        if: always()
        run: |
          ENDPOINT="https://construsmart-wm2026.vercel.app/"
          for i in 1 2 3; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$ENDPOINT" --max-time 10)
            if [ "$RESPONSE" = "200" ]; then
              echo "Homepage accessible (HTTP $RESPONSE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $RESPONSE, retrying in 5s..."
            sleep 5
          done
          echo "::warning::Post-deploy validation: HTTP $RESPONSE after 3 retries. Site may still be propagating."
          echo "Deploy completed but warm-up may need more time."