name: CI/CD — CONSTRUSMART ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
  VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
  VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
  VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY || '' }}
  NODE_ENV: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm test

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
        env:
          VITE_APP_ENV: production
      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::Missing Vercel secrets (VERCEL_ORG_ID, VERCEL_PROJECT_ID, VERCEL_TOKEN). Skipping auto-deploy."
            echo "Build ready for manual deploy."
            exit 0
          fi
          echo "Deploying to Vercel production..."
          if ! npx vercel deploy --prod --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" --yes 2>&1; then
            echo "::warning::Vercel deploy failed. Check VERCEL_ORG_ID ($VERCEL_ORG_ID) and VERCEL_PROJECT_ID ($VERCEL_PROJECT_ID) secrets."
            echo "Build successful but deploy skipped."
            exit 0
          fi
      - name: Post-Deploy Validation
        if: always()
        run: |
          ENDPOINT="https://construsmart-wm2026.vercel.app/"
          for i in 1 2 3; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$ENDPOINT" --max-time 10)
            if [ "$RESPONSE" = "200" ]; then
              echo "Homepage accessible (HTTP $RESPONSE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $RESPONSE, retrying in 5s..."
            sleep 5
          done
          echo "::warning::Post-deploy validation: HTTP $RESPONSE after 3 retries. Site may still be propagating."
          echo "Deploy completed but warm-up may need more time."
