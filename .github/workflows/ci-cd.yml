name: CI/CD — CONSTRUSMART ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
  VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
  VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
  VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY || '' }}
  NODE_ENV: test

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm test

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
        env:
          VITE_APP_ENV: production
      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::Faltan secrets de Vercel: VERCEL_ORG_ID, VERCEL_PROJECT_ID o VERCEL_TOKEN. Se omite deploy automático."
            echo "Build listo para deploy manual."
            exit 0
          fi
          if ! npx vercel project inspect --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" >/dev/null 2>&1; then
            echo "::warning::Vercel Project not found for $VERCEL_PROJECT_ID/$VERCEL_ORG_ID. Se omite deploy automático."
            echo "Build listo para deploy manual."
            exit 0
          fi
          npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes
      - name: Warm production edge cache
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://construsmart.vercel.app/
          curl -s -o /dev/null -w "%{http_code}" https://construsmart.vercel.app/index.html
