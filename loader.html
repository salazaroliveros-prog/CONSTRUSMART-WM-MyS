<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CONSTRUSMART ERP</title>
	<style>
		body {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
			background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
			font-family: 'Segoe UI', system-ui, sans-serif;
		}
		.loader-wrapper {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 24px;
		}
		.loader-circle-11 {
			position: relative;
			width: 80px;
			height: 80px;
			transform-style: preserve-3d;
			perspective: 400px;
		}
		.loader-circle-11 .arc {
			position: absolute;
			content: "";
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border-radius: 50%;
			border-bottom: 6px solid transparent;
		}
		.loader-circle-11 .arc:nth-child(1) {
			border-bottom-color: #0ea5e9;
			animation: rotate1 1.2s linear infinite;
		}
		.loader-circle-11 .arc:nth-child(2) {
			border-bottom-color: #f59e0b;
			animation: rotate2 1.2s linear infinite;
		}
		.loader-circle-11 .arc:nth-child(3) {
			border-bottom-color: #ffffff;
			animation: rotate3 1.2s linear infinite;
		}
		@keyframes rotate1 {
			from { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0); }
			to { transform: rotateX(35deg) rotateY(-45deg) rotateZ(1turn); }
		}
		@keyframes rotate2 {
			from { transform: rotateX(50deg) rotateY(10deg) rotateZ(0); }
			to { transform: rotateX(50deg) rotateY(10deg) rotateZ(1turn); }
		}
		@keyframes rotate3 {
			from { transform: rotateX(35deg) rotateY(55deg) rotateZ(0); }
			to { transform: rotateX(35deg) rotateY(55deg) rotateZ(1turn); }
		}
		.logo {
			width: 48px;
			height: 48px;
			border-radius: 12px;
			background: linear-gradient(135deg, #0ea5e9, #f59e0b);
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 800;
			color: white;
			font-size: 18px;
			box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
		}
		.text {
			text-align: center;
		}
		.text h2 {
			margin: 0;
			font-size: 20px;
			font-weight: 700;
			color: #ffffff;
		}
		.text p {
			margin: 4px 0 0;
			font-size: 12px;
			color: #94a3b8;
		}
	</style>
</head>
<body>
	<div class="loader-wrapper">
		<div class="logo">WM</div>
		<div class="loader-circle-11">
			<div class="arc"></div>
			<div class="arc"></div>
			<div class="arc"></div>
		</div>
		<div class="text">
			<h2>CONSTRUSMART ERP</h2>
			<p>Cargando sistema...</p>
		</div>
	</div>
</body>
</html>
