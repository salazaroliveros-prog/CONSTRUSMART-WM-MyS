<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>loader</title>
	<style>
		body {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
			background-color: #202628;
		}
		.loader-circle-11 {
			position: relative;
			width: 70px;
			height: 70px;
			transform-style: preserve-3d;
			perspective: 400px;
		}
		.loader-circle-11 .arc {
			position: absolute;
			content: "";
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border-radius: 50%;
			border-bottom: 5px solid transparent;
		}
		.loader-circle-11 .arc:nth-child(1) {
			border-bottom-color: #1a3a5c;
			animation: rotate1 1.15s linear infinite;
		}
		.loader-circle-11 .arc:nth-child(2) {
			border-bottom-color: #f4c430;
			animation: rotate2 1.15s linear infinite;
		}
		.loader-circle-11 .arc:nth-child(3) {
			border-bottom-color: #ffffff;
			animation: rotate3 1.15s linear infinite;
		}
		.loading .arc:nth-child(1) {
			animation-delay: -0.8s;
		}
		.loader-circle-11 .arc:nth-child(2) {
			animation-delay: -0.4s;
		}
		.loader-circle-11 .arc:nth-child(3) {
			animation-delay: 0s;
		}
		@keyframes rotate1 {
			from { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0); }
			to { transform: rotateX(35deg) rotateY(-45deg) rotateZ(1turn); }
		}
		@keyframes rotate2 {
			from { transform: rotateX(50deg) rotateY(10deg) rotateZ(0); }
			to { transform: rotateX(50deg) rotateY(10deg) rotateZ(1turn); }
		}
		@keyframes rotate3 {
			from { transform: rotateX(35deg) rotateY(55deg) rotateZ(0); }
			to { transform: rotateX(35deg) rotateY(55deg) rotateZ(1turn); }
		}
	</style>
</head>
<body>
	<div class="loader-circle-11">
		<div class="arc"></div>
		<div class="arc"></div>
		<div class="arc"></div>
	</div>
</body>
</html>
