<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/site.manifest.json" />
    <title>CONSTRUSMART WM — ERP Constructura</title>
    <meta name="description" content="ERP Integral para gestión constructura: proyectos, presupuestos, finanzas, RRHH y bodega." />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.webp" />
    <meta property="og:title" content="CONSTRUSMART ERP — CONSTRUCTORA WM / M&amp;S" />
    <meta property="og:description" content="ERP Integral para gestión constructura: proyectos, presupuestos, finanzas, RRHH y bodega." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://construsmart-wm2026.vercel.app/logo.webp" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://construsmart-wm2026.vercel.app/logo.webp" />
    <meta name="robots" content="index, follow" />
    <meta name="google" content="notranslate" />
  </head>

  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#0f172a;color:#fff;font-family:system-ui,sans-serif">
        <img src="/logo.webp" alt="WM" width="80" height="80" style="border-radius:12px;box-shadow:0 0 40px rgba(249,115,22,0.4)" />
        <h1 style="font-size:1.5rem;font-weight:800;margin:0">CONSTRUCTORA WM / M&amp;S</h1>
        <p style="font-size:0.8rem;color:#94a3b8;margin:0">Edificando el Futuro</p>
        <div style="margin-top:8px;width:32px;height:32px;border:4px solid rgba(255,255,255,0.15);border-top-color:#ff8c42;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script>
      window.addEventListener('load', () => {
        const el = document.getElementById('initial-loader');
        if (el && document.querySelector('#root>div:not(#initial-loader)')) el.remove();
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
